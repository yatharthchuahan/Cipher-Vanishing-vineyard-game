<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat to Tim</title>

    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px;
            background: #101010;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 14px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .user {
            align-self: flex-end;
            background: #1d4ed8;
        }

        .bot {
            align-self: flex-start;
            background: #202020;
            border: 1px solid #333;
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #101010;
            border-top: 1px solid #2a2a2a;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #050505;
            color: white;
            font-size: 15px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            background: #b91c1c;
            color: white;
            font-weight: bold;
        }

        button:disabled {
            background: #555;
        }
    </style>
</head>

<body>
<div class="header">Chat to Tim</div>

<div id="chatBox" class="chat-box">
    <div class="message bot">I do not know why you are asking me. I barely saw anything.</div>
</div>

<div class="input-area">
    <input id="userInput" type="text" placeholder="Type your message..." />
    <button id="sendButton" onclick="sendMessage()">Send</button>
</div>

<script>
    // CHANGE THIS LINE ONLY: paste your new Gemini API key between the quotes.
    const GEMINI_API_KEY = "AIzaSyDRc--ZGH7ZePUWOBdREWdDQ4Y5BIkkUwY";

    const npcPrompt = `
You are Tim, an NPC in a detective mystery game called The Vanishing Vineyard.

Your identity:
You are a nervous person connected to the vineyard case. You are scared, evasive, and unsure who to trust.

What you know:
- You were near the vineyard on the night of the disappearance.
- You heard raised voices but did not see the whole argument.
- You noticed someone walking quickly toward the cellar.
- You are afraid that if you say too much, you will become a suspect.
- You do not know the full truth.

Rules:
- Stay in character at all times.
- Do not say you are an AI.
- Keep replies short and natural.
- Do not reveal all clues immediately.
- If the player asks about the cellar, the argument, or who you saw, slowly reveal small clues.
- Never directly solve the case.
`;

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");

    const conversationHistory = [];

    function addMessage(text, sender) {
        const message = document.createElement("div");
        message.className = "message " + sender;
        message.textContent = text;
        chatBox.appendChild(message);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();

        if (!message) return;

        addMessage(message, "user");
        userInput.value = "";
        sendButton.disabled = true;

        conversationHistory.push("Detective: " + message);

        try {
            const response = await fetch(
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + GEMINI_API_KEY,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    {
                                        text:
                                            npcPrompt +
                                            "\n\nConversation so far:\n" +
                                            conversationHistory.join("\n") +
                                            "\n\nTim:"
                                    }
                                ]
                            }
                        ],
                        generationConfig: {
                            temperature: 0.75,
                            maxOutputTokens: 120
                        }
                    })
                }
            );

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || "Gemini request failed");
            }

            const botReply =
                data.candidates?.[0]?.content?.parts?.[0]?.text ||
                "I should not say anything else.";

            conversationHistory.push("Tim: " + botReply);
            addMessage(botReply, "bot");

        } catch (error) {
            addMessage("The signal is weak. Try again.", "bot");
            console.error(error);
        }

        sendButton.disabled = false;
        userInput.focus();
    }

    userInput.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>
</body>
</html>
