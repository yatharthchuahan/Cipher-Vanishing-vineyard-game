<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Test</title>
    <style>
        body {
            background-color: #000000;
            text-align: center;
            padding-top: 50px;
        }
    </style>
    <script>
        window.watsonAssistantChatOptions = {
          integrationID: "787b8644-26f3-4300-b76b-16088395e31b", // The ID of this integration.
          region: "us-south", // The region your integration is hosted in.
          serviceInstanceID: "aa6ea37d-cfc7-42a1-8d24-4a341356fe2b", // The ID of your service instance.
          onLoad: function(instance) { instance.render(); }
        };
        setTimeout(function(){
          const t = document.createElement('script');
          t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
          document.head.appendChild(t);
        }, 1000); // Increased the timeout to 3000ms (3 seconds)
    </script>
</head>
<body>
<h1>Chat to unknown </h1>
</body>
</html>
